<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Template Generator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="wrap">
    <h2>Word Template Generator</h2>
    <div class="hint">Локальный режим: укажите путь к workspace на этом компьютере.</div>

    <div class="card">
      <div class="section-title">Проект</div>
      <div class="row row-wrap">
        <input id="workspace" class="grow" placeholder="/путь/к/workspace" />
        <button class="secondary" onclick="withLoading(event, pickFolder)">Выбрать папку...</button>
        <button class="secondary" onclick="withLoading(event, loadActs)">Загрузить</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Недавние проекты</div>
      <div class="row row-wrap">
        <select id="recent" class="grow recent-select"></select>
        <div class="actions">
          <button class="secondary" onclick="useRecent()">Использовать</button>
          <button class="secondary" onclick="removeRecent()">Удалить</button>
          <button class="secondary" onclick="clearRecent()">Очистить все</button>
        </div>
      </div>
      <div class="muted">Пути сохраняются только в этом браузере (localStorage).</div>
    </div>

    <div class="card">
      <div class="section-title">Настройки генерации</div>
      <div class="row row-wrap">
        <label for="templateSelect">Шаблон</label>
        <select id="templateSelect" class="grow"></select>
      </div>
      <div class="row row-wrap">
        <label for="outputDir">Папка для результата</label>
        <input id="outputDir" class="grow" placeholder="generated" />
        <select id="outputDirSelect"></select>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Генерация</div>
      <div class="row row-wrap">
        <button class="secondary" onclick="withLoading(event, validateWs)">Проверить</button>
        <button onclick="withLoading(event, buildAll)">Сгенерировать все</button>
      </div>
      <div class="row row-wrap">
        <label for="acts">Один акт</label>
        <select id="acts" class="grow"></select>
        <button onclick="withLoading(event, buildOne)">Сгенерировать выбранный</button>
      </div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
      <div class="row row-wrap log-header">
        <div class="section-title">Результаты</div>
        <div class="actions">
          <select id="resultsSort" class="results-sort" title="Сортировка результатов">
            <option value="mtime_desc">По дате изменения (новые сверху)</option>
            <option value="name_asc">По имени (А-Я)</option>
          </select>
          <button class="secondary" onclick="clearResults()">Очистить</button>
        </div>
      </div>
      <div id="resultsList" class="results-list"></div>
    </div>

    <div class="card">
      <div class="row row-wrap log-header">
        <div class="section-title">Логи</div>
        <button class="secondary" onclick="clearLog()">Очистить лог</button>
      </div>
      <textarea id="log" readonly></textarea>
    </div>
  </div>
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="/static/app.js"></script>
</body>
</html>
